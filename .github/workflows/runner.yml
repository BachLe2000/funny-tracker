name: fr fr

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: explode
        run: |
          echo "📥 Downloading main.js from gist..."
          curl -o main.js "${{ secrets.GIST_RAW_URL }}"

      - name: thinker
        run: node main.js
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          WEBHOOK_URL: ${{ secrets.MAIN_WEBHOOK }}
          ERROR_WEBHOOK_URL: ${{ secrets.ERROR_WEBHOOK }}
          PING_ROLE_ID: ${{ secrets.PING_ROLE_ID }}
          UPDATE_WEBHOOK_URL: ${{ secrets.UPDATE_WEBHOOK }}
          LOCALE: vi

      - name: whynot
        run: |
          git config --global user.name "BachLe2000"
          git config --global user.email "65167922+BachLe2000@users.noreply.github.com"
          git add -A
          git reset main.js
          git diff --cached --quiet || git commit -m "updater"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
